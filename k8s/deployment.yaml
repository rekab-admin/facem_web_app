apiVersion: apps/v1
kind: Deployment
metadata:
  name: facem-web
  labels:
    app: facem-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: facem-web
  template:
    metadata:
      labels:
        app: facem-web
    spec:
      containers:
        - name: facem-web
          # Replace OWNER/REPO with the actual GitHub repository (matches the image pushed by .github/workflows/ci.yml).
          image: ghcr.io/OWNER/REPO:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
